<div class="container section">
  <div class="page-header"><h2>My Profile</h2></div>

  @if (loading) {
    <div class="loading-overlay"><div class="spinner"></div></div>
  } @else if (profile) {
    <div class="grid-2" style="max-width:900px">
      <div class="card">
        <div class="card-header"><h4>Profile Info</h4></div>
        <div class="card-body">
          <div class="profile-avatar">{{ profile.name[0].toUpperCase() }}</div>
          <div class="profile-detail"><span class="detail-label">Name</span><span>{{ profile.name }}</span></div>
          <div class="profile-detail"><span class="detail-label">Email</span><span>{{ profile.email }}</span></div>
          <div class="profile-detail"><span class="detail-label">Phone</span><span>{{ profile.phone }}</span></div>
          <div class="profile-detail"><span class="detail-label">Role</span><span class="badge badge-info">{{ profile.role }}</span></div>
          <div class="profile-detail"><span class="detail-label">Member since</span><span>{{ formatDate(profile.createdAt) }}</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h4>Update Profile</h4></div>
        <div class="card-body">
          <form [formGroup]="editForm" (ngSubmit)="save()" class="edit-form">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input formControlName="name" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input formControlName="phone" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary" [disabled]="saving">
              @if (saving) { <span class="spinner-sm"></span> } Save Changes
            </button>
          </form>
        </div>
      </div>
    </div>
  }
</div>
